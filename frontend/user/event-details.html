<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard - OSIAN</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="../shared/css/style-dashboard.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css">
    
    <style>
        :root {
            --osian-cyan: #5ffbf1;
            --osian-cyan-dim: rgba(95, 251, 241, 0.1);
            --osian-cyan-glow: rgba(95, 251, 241, 0.4);
            --bg-dark: #070b12;
            --bg-card: rgba(13, 20, 34, 0.7);
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --gradient-primary: linear-gradient(135deg, #5ffbf1 0%, #4facfe 100%);
        }

        /* Global Polish */
        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 0%, #1a2c4e 0%, #070b12 70%);
            background-attachment: fixed;
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* Layout & Alignment */
        .app-shell {
            display: flex;
            min-height: 100vh;
        }

        .main-content {
            flex: 1;
            padding: 0;
            width: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .content-wrapper {
            padding: 2rem;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            box-sizing: border-box;
        }

        /* Top Bar Styling */
        .dashboard-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 2rem;
            background: rgba(7, 11, 18, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(95, 251, 241, 0.1);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .mobile-menu-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 8px;
            transition: all 0.3s ease;
            display: none; /* Shown by JS/Media Query usually */
        }

        .mobile-menu-btn:hover {
            color: var(--osian-cyan);
            border-color: var(--osian-cyan);
            box-shadow: 0 0 10px var(--osian-cyan-dim);
        }

        /* Loading Animation & Skeleton */
        .loading-spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(95, 251, 241, 0.2);
            border-radius: 50%;
            border-top-color: var(--osian-cyan);
            animation: spin 0.8s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .skeleton {
            background: linear-gradient(90deg, rgba(19, 28, 46, 0.5) 25%, rgba(30, 41, 59, 0.5) 50%, rgba(19, 28, 46, 0.5) 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 12px;
        }
        
        .skeleton-card {
            background: rgba(13, 20, 34, 0.5);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            width: 100%;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ---------------------------
           Event Details Premium UI 
           --------------------------- */

        /* Back Button */
        .back-btn {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.6rem 1.2rem;
            border-radius: 50px; /* Pill shape */
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 2rem;
        }
        
        .back-btn:hover {
            background: var(--osian-cyan-dim);
            color: var(--osian-cyan);
            border-color: var(--osian-cyan);
            transform: translateX(-5px);
            box-shadow: 0 0 15px var(--osian-cyan-dim);
        }

        /* Banner */
        .event-banner-container {
            width: 100%;
            aspect-ratio: 21 / 9; /* More cinematic */
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            margin: 0 auto 2.5rem auto;
            position: relative;
            border: 1px solid rgba(95, 251, 241, 0.15);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .event-banner-container::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to top, rgba(7, 11, 18, 0.9) 0%, transparent 100%);
            pointer-events: none;
        }

        .event-banner {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.7s ease;
        }

        .event-banner:hover {
            transform: scale(1.03);
        }

        .event-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(45deg, #0f172a, #1e293b);
            color: var(--osian-cyan);
            font-size: 4rem;
        }

        /* Header Text */
        .details-header {
            margin-bottom: 2.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid rgba(95, 251, 241, 0.1);
            position: relative;
        }

        .details-title {
            font-size: 3rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 1rem;
            line-height: 1.1;
            letter-spacing: -0.02em;
            /* Gradient Text */
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(95, 251, 241, 0.1);
        }

        .details-subtitle {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
            color: var(--text-muted);
            font-size: 1.05rem;
        }

        /* Status Badges */
        .badge {
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            backdrop-filter: blur(4px);
        }

        .badge.status-live {
            background: rgba(16, 185, 129, 0.1);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.3);
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.1);
        }

        .badge.status-completed {
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        /* Meta Grid (Info Cards) */
        .meta-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .meta-item {
            background: rgba(13, 20, 34, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1.5rem;
            border-radius: 16px;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .meta-item:hover {
            transform: translateY(-5px);
            border-color: rgba(95, 251, 241, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .meta-label {
            font-size: 0.75rem;
            color: var(--osian-cyan);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 0.8rem;
            font-weight: 600;
            opacity: 0.9;
        }

        .meta-value {
            font-size: 1.2rem;
            font-weight: 500;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .meta-value i {
            color: var(--text-muted);
            font-size: 1.4rem;
        }

        /* Description Content */
        .description-section {
            margin-bottom: 3.5rem;
            line-height: 1.9;
            color: #cbd5e1;
            font-size: 1.05rem;
            background: rgba(13, 20, 34, 0.4);
            padding: 2.5rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
        }

        .description-section h3 {
            color: #fff;
            margin-top: 0;
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
        }

        .description-section h3::before {
            content: '';
            display: block;
            width: 4px;
            height: 24px;
            background: var(--osian-cyan);
            margin-right: 12px;
            border-radius: 4px;
            box-shadow: 0 0 10px var(--osian-cyan);
        }

        /* Registration & Form Section */
        .registration-container {
            background: linear-gradient(145deg, rgba(13, 20, 34, 0.9), rgba(13, 20, 34, 0.6));
            border: 1px solid rgba(95, 251, 241, 0.2);
            border-radius: 24px;
            padding: 3rem;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        /* Scanline effect on container */
        .registration-container::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--osian-cyan), transparent);
            animation: scanline 4s linear infinite;
            opacity: 0.5;
        }
        @keyframes scanline {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .registration-container h3 {
            margin-top: 0;
            margin-bottom: 2.5rem;
            color: #fff;
            font-size: 1.8rem;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 700;
        }

        /* Input Styling Fixes */
        .form-group input, 
        .form-group select, 
        .form-group textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 1rem;
            border-radius: 8px;
            font-family: inherit;
            transition: 0.3s;
        }
        
        .form-group input:focus {
            border-color: var(--osian-cyan);
            outline: none;
            box-shadow: 0 0 15px rgba(95, 251, 241, 0.1);
            background: rgba(0, 0, 0, 0.5);
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .form-group.full { grid-column: 1 / -1; }

        /* Submit Button */
        .btn-submit {
            background: var(--gradient-primary);
            color: #000;
            border: none;
            padding: 1.2rem 2rem;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-top: 2.5rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .btn-submit::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transform: translateX(-100%);
            transition: 0.5s;
            z-index: -1;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(95, 251, 241, 0.4);
        }
        
        .btn-submit:hover::before {
            transform: translateX(0);
        }

        .btn-submit:disabled {
            filter: grayscale(1);
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Reg Status Cards */
        .reg-status-card {
            padding: 3rem 2rem;
            border-radius: 16px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            background: rgba(13, 20, 34, 0.5);
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }

        .reg-closed { border-color: rgba(239, 68, 68, 0.5); color: #EF4444; }
        .reg-login { border-color: rgba(245, 158, 11, 0.5); color: #F59E0B; }
        .reg-success { border-color: rgba(16, 185, 129, 0.5); color: #10B981; }

        /* Quick Actions (User Dashboard Context) */
        .quick-actions {
            display: flex;
            gap: 15px;
            margin-top: 25px;
            flex-wrap: wrap;
        }
        
        .quick-action-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(95, 251, 241, 0.2);
            border-radius: 12px;
            color: var(--osian-cyan);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }
        .quick-action-btn:hover {
            background: rgba(95, 251, 241, 0.15);
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(95, 251, 241, 0.15);
            border-color: var(--osian-cyan);
            color: #fff;
        }

        /* Achievement Badges */
        .achievement-badge {
            width: 48px;
            height: 48px;
            background: var(--gradient-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #070B12;
            font-size: 22px;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(95, 251, 241, 0.3);
        }
        
        /* Toast */
        #toast-container {
            position: fixed;
            top: 90px;
            right: 30px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-width: 300px;
        }
        
        .toast {
            background: rgba(7, 11, 18, 0.95);
            border-left: 4px solid var(--osian-cyan);
            border-radius: 8px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            color: #fff;
            backdrop-filter: blur(10px);
            animation: slideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        @keyframes slideIn {
            from { transform: translateX(120%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9998;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
        }
        
        .modal-content {
            background: #0f1623;
            border-radius: 20px;
            border: 1px solid rgba(95, 251, 241, 0.15);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 500px;
            position: relative;
            overflow: hidden;
            animation: modalPop 0.3s ease-out;
        }

        @keyframes modalPop {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        
        .modal-header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
        }
        
        .modal-header h2 {
            margin: 0;
            color: #fff;
            font-size: 1.2rem;
            letter-spacing: 0.5px;
        }
        
        .modal-close {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            color: #fff;
            width: 32px; height: 32px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        
        .modal-close:hover {
            background: rgba(239, 68, 68, 0.2);
            color: #EF4444;
        }
        
        .modal-body {
            padding: 2rem;
            max-height: 60vh;
            overflow-y: auto;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .content-wrapper { padding: 1rem; }
            .details-title { font-size: 2rem; }
            .form-grid { grid-template-columns: 1fr; }
            .registration-container { padding: 1.5rem; }
            .meta-grid { grid-template-columns: 1fr 1fr; gap: 1rem; }
            .mobile-menu-btn { display: block; }
        }
    </style>
</head>
<body>
    <div class="app-shell">
        <div id="sidebar-container" class="sidebar"></div>
        
        <div class="overlay" id="overlay"></div>

        <main class="main-content">
            <header class="dashboard-topbar">
                <div class="topbar-branding">
                    </div>
                <button id="mobile-menu-btn" class="mobile-menu-btn">
                    <i class='bx bx-menu'></i>
                </button>
            </header>

            <div class="content-wrapper">
                <div id="event-details-container" class="dashboard-section" data-aos="fade-up">
                    <div class="skeleton-card" style="height: 400px; display: flex; align-items: center; justify-content: center;">
                         <div class="loading-spinner"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="toast-container"></div>

    <div id="quiz-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Quiz Details</h2>
                <button class="modal-close" id="modal-close"><i class='bx bx-x'></i></button>
            </div>
            <div class="modal-body" id="modal-body">
                </div>
        </div>
    </div>

    <script src="../shared/auth-guard.js"></script>
    <script src="../shared/js/shared-init.js"></script>
    <script src="../shared/js/script-toast-helper.js"></script>
    <script src="../user/script-dashboard-user.js"></script>
    <script src="../user/script-event-details.js"></script>
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800, offset: 50, easing: 'ease-out-quad', once: true });
    </script>
</body>
</html>
