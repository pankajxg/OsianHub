<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - OSIAN</title>
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    
    <!-- CSS -->
    <link rel="stylesheet" href="/frontend/shared/css/style-dashboard.css">
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
    <style>
        /* Notifications specific styles */
        .btn-mark-read {
            background: transparent;
            border: 1px solid var(--osian-cyan);
            color: var(--osian-cyan);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }

        .btn-mark-read:hover {
            background: rgba(95, 251, 241, 0.1);
            box-shadow: 0 0 10px rgba(95, 251, 241, 0.2);
        }

        .notifications-card {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            margin-top: 20px;
        }

        .notification-item {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            padding: 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: background-color 0.3s ease;
            position: relative;
        }

        .notification-item:last-child {
            border-bottom: none;
        }

        .notification-item:hover {
            background-color: rgba(255, 255, 255, 0.02);
        }

        .notification-item.unread {
            background-color: rgba(95, 251, 241, 0.03);
            border-left: 3px solid var(--osian-cyan);
        }

        .notification-icon {
            font-size: 28px;
            color: var(--osian-cyan);
            background: rgba(95, 251, 241, 0.1);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .notification-content {
            flex: 1;
        }

        .notification-content h4 {
            margin: 0 0 8px 0;
            color: var(--text-main);
            font-size: 1.1rem;
            font-weight: 600;
        }

        .notification-content p {
            margin: 0 0 12px 0;
            color: var(--text-para);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .notification-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .mark-read-inline {
            background: none;
            border: none;
            color: var(--osian-cyan);
            cursor: pointer;
            font-size: 0.8rem;
            padding: 0;
            display: flex;
            align-items: center;
            gap: 4px;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        .mark-read-inline:hover {
            opacity: 1;
            text-decoration: underline;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 64px;
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.1);
        }

        .empty-state p {
            font-size: 1.1rem;
        }

        @media (max-width: 600px) {
            .notification-item {
                padding: 15px;
                gap: 15px;
            }
            .notification-icon {
                width: 40px;
                height: 40px;
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="app-shell">
        <!-- Sidebar/Navbar -->
        <div id="sidebar-container" class="sidebar"></div>
        
        <!-- Mobile Overlay -->
        <div class="overlay" id="overlay"></div>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="dashboard-header">
                <div class="welcome-section">
                    <h1>Notifications 🔔</h1>
                    <p>Stay updated with your latest activities</p>
                </div>
                
                <button id="mobile-menu-btn" class="mobile-menu-btn">
                    <i class='bx bx-menu'></i>
                </button>
            </header>

            <div class="dashboard-container" style="max-width: 100%; padding: 0;">
                <div class="header-section" style="justify-content: flex-end; margin-bottom: 1rem;">
                    <button id="mark-all-read" class="btn-mark-read">
                        <i class='bx bx-check-double'></i> Mark All as Read
                    </button>
                </div>

                <div class="notifications-card">
                    <div id="notifications-list">
                        <div class="empty-state">
                            <i class='bx bx-loader-alt bx-spin'></i>
                            <p>Loading notifications...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="/frontend/shared/auth-guard.js"></script>
    <script src="/frontend/shared/js/shared-init.js"></script>
    <script src="/frontend/user/script-dashboard-user.js"></script>
    <script src="script-notifications.js"></script>
</body>
</html>
