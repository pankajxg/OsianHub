<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - OSIAN</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="../shared/css/style-dashboard.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Theme Variables */
        :root {
            --bg-dark: #050509;
            --bg-card: rgba(13, 17, 26, 0.7);
            --bg-card-hover: rgba(20, 25, 38, 0.9);
            --osian-cyan: #00f2ff;
            --osian-mint: #00ff9d;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --gradient-primary: linear-gradient(135deg, #00f2ff 0%, #00ff9d 100%);
            --gold: #FFD700;
            --silver: #C0C0C0;
            --bronze: #CD7F32;
        }

        /* Header */
        .dashboard-header { margin-bottom: 20px; }
        .realtime-indicator {
            display: inline-flex; align-items: center; gap: 8px; padding: 4px 12px;
            background: rgba(0, 242, 255, 0.1); border-radius: 99px;
            font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px;
            color: var(--osian-cyan); border: 1px solid rgba(0, 242, 255, 0.2);
            margin-left: 12px; vertical-align: middle; box-shadow: 0 0 10px rgba(0, 242, 255, 0.1);
        }
        .pulse-dot {
            width: 6px; height: 6px; background: var(--osian-cyan);
            border-radius: 50%; animation: pulse-dot 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
            box-shadow: 0 0 8px var(--osian-cyan);
        }
        @keyframes pulse-dot { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.5; } }

        /* Controls */
        .refresh-controls {
            display: flex; align-items: center; justify-content: space-between;
            gap: 15px; margin-bottom: 20px; background: rgba(255, 255, 255, 0.02);
            padding: 10px 15px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.05); flex-wrap: wrap;
        }
        .refresh-group-left { display: flex; align-items: center; gap: 15px; }
        .refresh-btn {
            padding: 8px 16px; background: rgba(0, 242, 255, 0.05);
            border: 1px solid rgba(0, 242, 255, 0.2); border-radius: 8px;
            color: var(--osian-cyan); cursor: pointer; font-size: 0.85rem; font-weight: 500;
            display: flex; align-items: center; gap: 8px; transition: all 0.3s;
        }
        .refresh-btn:hover {
            background: rgba(0, 242, 255, 0.15); box-shadow: 0 0 15px rgba(0, 242, 255, 0.15);
            transform: translateY(-1px);
        }
        .refresh-btn.spinning i { animation: spin 0.8s linear infinite; }

        /* Filters */
        .leaderboard-filters {
            display: flex; gap: 20px; margin-bottom: 30px; background: var(--bg-card);
            padding: 24px; border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.05);
            flex-wrap: wrap; box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .filter-group { display: flex; flex-direction: column; gap: 10px; flex: 1; min-width: 200px; }
        .filter-group label {
            font-size: 0.8rem; color: var(--osian-cyan); font-weight: 700;
            letter-spacing: 0.5px; text-transform: uppercase;
        }
        .filter-select {
            padding: 12px 16px; background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1); color: var(--text-main);
            border-radius: 10px; outline: none; cursor: pointer; font-size: 0.95rem;
            transition: all 0.3s;
        }
        .filter-select:focus { border-color: var(--osian-cyan); background: rgba(0, 0, 0, 0.5); }

        /* Table */
        .content-box { background: transparent; border: none; padding: 0; }
        .leaderboard-table { width: 100%; border-collapse: separate; border-spacing: 0 12px; }
        .leaderboard-table thead th {
            text-align: left; padding: 0 24px 12px 24px; color: var(--text-muted);
            font-weight: 600; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;
        }
        .leaderboard-table tbody tr {
            background: var(--bg-card); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .leaderboard-table tbody tr:hover {
            transform: translateY(-4px) scale(1.005); background: var(--bg-card-hover);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4); z-index: 10;
        }
        .leaderboard-table td {
            padding: 20px 24px; color: var(--text-main);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); vertical-align: middle;
        }
        .leaderboard-table td:first-child { border-left: 1px solid rgba(255, 255, 255, 0.05); border-top-left-radius: 16px; border-bottom-left-radius: 16px; }
        .leaderboard-table td:last-child { border-right: 1px solid rgba(255, 255, 255, 0.05); border-top-right-radius: 16px; border-bottom-right-radius: 16px; }

        .rank-cell { font-weight: 800; font-size: 1.2rem; width: 80px; text-align: center; }
        .rank-1 td { border-color: rgba(255, 215, 0, 0.3); background: linear-gradient(90deg, rgba(255, 215, 0, 0.1), rgba(13, 17, 26, 0.7)); }
        .rank-1 .rank-cell { color: var(--gold); text-shadow: 0 0 15px rgba(255, 215, 0, 0.5); }
        .rank-2 td { border-color: rgba(192, 192, 192, 0.3); background: linear-gradient(90deg, rgba(192, 192, 192, 0.08), rgba(13, 17, 26, 0.7)); }
        .rank-2 .rank-cell { color: var(--silver); }
        .rank-3 td { border-color: rgba(205, 127, 50, 0.3); background: linear-gradient(90deg, rgba(205, 127, 50, 0.08), rgba(13, 17, 26, 0.7)); }
        .rank-3 .rank-cell { color: var(--bronze); }

        .user-info { display: flex; align-items: center; gap: 16px; }
        .user-avatar-leaderboard {
            width: 48px; height: 48px; border-radius: 50%;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            display: flex; align-items: center; justify-content: center; font-weight: 700;
            color: var(--osian-cyan); border: 2px solid rgba(0, 242, 255, 0.3);
        }
        .user-name { font-weight: 600; font-size: 1rem; color: var(--text-main); display: block; }
        .highlight-row { background: rgba(0, 242, 255, 0.05) !important; border: 1px solid var(--osian-cyan) !important; }

        .loading-spinner {
            width: 40px; height: 40px; border: 3px solid rgba(0, 242, 255, 0.1); border-radius: 50%;
            border-top-color: var(--osian-cyan); animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Toast */
        #toast-container { position: fixed; top: 24px; right: 24px; z-index: 10000; }
        .toast {
            background: rgba(10, 15, 25, 0.95); border-left: 4px solid var(--osian-cyan);
            border-radius: 8px; padding: 16px; display: flex; align-items: center; gap: 14px;
            color: #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        @media (max-width: 768px) {
            .leaderboard-filters, .refresh-controls { flex-direction: column; gap: 16px; align-items: flex-start; }
            .leaderboard-table { min-width: 600px; }
        }
    </style>
</head>
<body>
    <div class="app-shell">
         <div id="sidebar-container" class="sidebar"></div>
        <div class="overlay" id="overlay"></div>

        <main class="main-content">
            <header class="dashboard-header">
                <div class="welcome-section">
                    <h1>Leaderboard 🏆 <span class="realtime-indicator"><span class="pulse-dot"></span> Live</span></h1>
                    <p>Real-time ranking updates as participants complete quizzes</p>
                </div>
                <button id="mobile-menu-btn" class="mobile-menu-btn"><i class='bx bx-menu'></i></button>
            </header>

            <div class="refresh-controls">
                <div class="refresh-group-left">
                    <button id="refresh-btn" class="refresh-btn"><i class='bx bx-refresh'></i> Refresh Now</button>
                </div>
                <div style="font-size: 0.75rem; color: var(--text-muted); font-family: monospace;">
                    Last updated: <span id="last-updated" style="color: var(--osian-cyan);">--:--:--</span>
                </div>
            </div>

            <div class="leaderboard-filters">
                <div class="filter-group">
                    <label><i class='bx bx-filter-alt'></i> Category</label>
                    <select id="category-filter" class="filter-select">
                        <option value="all">All Categories</option>
                        <option value="technology">Technology</option>
                        <option value="science">Science</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label><i class='bx bx-calendar'></i> Time Period</label>
                    <select id="period-filter" class="filter-select">
                        <option value="all">All Time</option>
                        <option value="weekly">This Week</option>
                        <option value="daily">Today</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label><i class='bx bx-group'></i> Scope</label>
                    <select id="scope-filter" class="filter-select">
                        <option value="global">Global</option>
                        <option value="department">Department</option>
                        <option value="friends">Friends</option>
                    </select>
                </div>
            </div>

            <div class="content-box">
                <div style="overflow-x: auto; padding: 5px;">
                    <table class="leaderboard-table">
                        <thead>
                            <tr>
                                <th>Rank</th>
                                <th>User</th>
                                <th>Composite Score</th>
                                <th>Avg Score</th>
                                <th>Accuracy</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboard-body">
                            <tr class="loading-row">
                                <td colspan="5" style="text-align: center; padding: 60px;">
                                    <div class="loading-spinner" style="margin: 0 auto;"></div>
                                    <p style="margin-top: 20px; color: var(--text-muted);">SYNCING LEADERBOARD DATA...</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="toast-container"></div>

    <script src="../shared/auth-guard.js"></script>
    <script src="../shared/js/script-toast-helper.js"></script>
    <script src="../shared/js/shared-init.js"></script>
    <script src="../user/script-leaderboard.js"></script>
</body>
</html>
