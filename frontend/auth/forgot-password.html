<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSIAN - Forgot Password</title>
    <link rel="stylesheet" href="../shared/css/style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body class="login-page">
    <div class="login-container">
        <div class="info-section">
            <div class="info-content">
                <h1 class="logo-name">OSIAN</h1>
                <p>Reset Your Password</p>
            </div>
        </div>
        <div class="form-section">
            <div class="form-wrapper">
                <h2>Forgot Password</h2>
                <p style="margin-bottom: 20px; color: #555;">Reset your password using OTP sent to your email.</p>

                <form id="forgot-password-form">
                    <div class="input-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="Enter your registered email" required>
                    </div>
                    <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:10px;">
                        <button type="submit" class="login-btn" id="send-otp-btn">Send Reset OTP</button>
                    </div>
                </form>

                <div id="otp-section" style="display:none; margin-top:20px;">
                    <div class="input-group">
                        <label for="otp">OTP</label>
                        <input type="text" id="otp" placeholder="Enter 6-digit OTP" maxlength="6" inputmode="numeric" autocomplete="one-time-code">
                        <p id="otp-timer" style="font-size: 0.9rem; color: #666; margin-top: 5px; display:none;">Resend available in <span id="timer-count">60</span>s</p>
                    </div>
                    <button type="button" class="login-btn" id="verify-otp-btn">Verify OTP</button>
                    <button type="button" class="login-btn" id="resend-otp-btn" style="background: #6c757d; margin-top: 10px;">Resend OTP</button>
                </div>

                <div id="reset-section" style="display:none; margin-top:20px;">
                    <form id="reset-password-form">
                        <div class="input-group">
                            <label for="new-password">New Password</label>
                            <input type="password" id="new-password" placeholder="Enter new password" required>
                        </div>
                        <div id="password-strength-container" style="display: none; margin-top: 10px; font-size: 0.85rem; color: #666;">
                            <p style="margin-bottom: 5px; font-weight: 500;">Password Strength:</p>
                            <ul style="list-style: none; padding-left: 0; margin: 0;">
                                <li id="rule-length" class="password-rule"><i class='bx bx-x-circle'></i> At least 8 characters</li>
                                <li id="rule-uppercase" class="password-rule"><i class='bx bx-x-circle'></i> One uppercase letter</li>
                                <li id="rule-lowercase" class="password-rule"><i class='bx bx-x-circle'></i> One lowercase letter</li>
                                <li id="rule-number" class="password-rule"><i class='bx bx-x-circle'></i> One number</li>
                                <li id="rule-special" class="password-rule"><i class='bx bx-x-circle'></i> One special char (@#$!%*?&)</li>
                            </ul>
                        </div>
                        <div class="input-group">
                            <label for="confirm-password">Confirm Password</label>
                            <input type="password" id="confirm-password" placeholder="Confirm new password" required>
                        </div>
                        <button type="submit" class="login-btn" id="reset-btn">Reset Password</button>
                    </form>
                </div>

                <p id="form-status" style="margin-top: 15px; text-align: center;"></p>

                <div class="register-link">
                    <p>Remember your password? <a href="login.html">Login</a></p>
                </div>
            </div>
        </div>
    </div>
    <script src="../shared/js/shared-init.js?v=20260625"></script>
    <script src="../shared/js/script-toast-helper.js"></script>
    <script src="script-forgot-password.js"></script>
</body>
</html>
