<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Global Quizzes - OSIAN Super Admin</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Dark Theme Palette */
            --bg-main: #070B12;
            --bg-sidebar: #06121F;
            --bg-card: #0D1422;

            --text-main: #E6F1FF;
            --text-para: #BFD3E6;
            --text-muted: #8FA9C4;
            --text-sidebar: #BFD3E6;

            --primary: #86FDE8; /* OSIAN mint */
            --primary-hover: #5FFBF1; /* OSIAN cyan */
            --secondary: #F9F586; /* OSIAN yellow */
            
            --border: rgba(134,253,232,0.18);
            --border-color: rgba(134,253,232,0.18);
            
            --success: #86FDE8;
            --warning: #F9F586;
            --danger: #FF6B6B;

            --shadow: 0 14px 36px rgba(0,0,0,0.6);
            --osian-glow: rgba(134,253,232,0.35);
            --osian-gradient: linear-gradient(135deg, #5FFBF1, #86FDE8, #F9F586);

            /* Card Colors - Updated for dark theme */
            --color-blue-500: #5FFBF1; /* Cyan */
            --color-green-500: #86FDE8; /* Mint */
            --color-purple-500: #A78BFA; /* Light purple */
            --color-amber-500: #F9F586; /* Yellow */
            --color-cyan-500: #5FFBF1; /* Cyan */

            /* Additional colors */
            --white: #ffffff;
            --secondary-color: #0F1A2B;
            --text-light: #9FB6CC;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 16rem;
            background-color: var(--bg-sidebar);
            color: var(--text-sidebar);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            left: 0;
            top: 0;
            z-index: 1000;
            transition: transform 0.3s ease;
            border-right: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .brand {
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            border-bottom: 1px solid var(--border);
            background: var(--osian-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand i {
            font-size: 1.5rem;
            background: var(--osian-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand span {
            font-size: 1.25rem;
            font-weight: 700;
            background: var(--osian-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-menu {
            flex: 1;
            padding: 1.5rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            overflow-y: auto;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 0.5rem;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            font-weight: 500;
            border: 1px solid transparent;
        }

        .nav-item:hover {
            background-color: rgba(134, 253, 232, 0.08);
            border-color: var(--border);
            color: var(--text-main);
            transform: translateX(5px);
        }

        .nav-item.active {
            background: rgba(134, 253, 232, 0.12);
            border-color: var(--primary);
            color: var(--primary);
            box-shadow: 0 0 20px var(--osian-glow);
        }

        .nav-item i {
            font-size: 1.25rem;
        }

        .logout-container {
            padding: 1rem;
            border-top: 1px solid var(--border);
        }

        /* Main Content */
        .main-content {
            margin-left: 16rem;
            flex: 1;
            padding: 2rem;
            max-width: calc(100vw - 16rem);
            min-height: 100vh;
            background-color: var(--bg-main);
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 2.5rem;
            background: transparent;
            padding: 1rem 0;
        }

        .page-title h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 0.5rem;
            background: var(--osian-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-title p {
            color: var(--text-para);
            font-size: 1rem;
            line-height: 1.5;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .notification-icon {
            font-size: 1.5rem;
            color: var(--text-muted);
            cursor: pointer;
            position: relative;
            transition: color 0.3s;
        }

        .notification-icon:hover {
            color: var(--primary);
        }

        .notification-badge {
            position: absolute;
            top: -2px;
            right: -2px;
            width: 8px;
            height: 8px;
            background-color: var(--danger);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--danger);
        }

        .user-profile-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            cursor: pointer;
        }

        /* Avatar */
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--osian-gradient);
            color: var(--bg-sidebar);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 1rem;
            border: 2px solid var(--primary);
            overflow: hidden;
            flex-shrink: 0;
        }

        /* Mobile Menu Toggle */
        .mobile-toggle {
            display: none;
            font-size: 1.5rem;
            color: var(--primary);
            cursor: pointer;
            margin-right: 1rem;
            background: var(--osian-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Container Styling */
        .container {
            width: 100%;
            margin: 0 auto;
        }

        /* Card Styling */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.75rem;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--osian-gradient);
        }

        /* Button Styling */
        .btn {
            background: var(--osian-gradient);
            color: var(--bg-sidebar);
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.875rem;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px var(--osian-glow);
        }

        .btn-primary {
            background: var(--osian-gradient);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-main);
        }

        .btn-outline:hover {
            background: rgba(134, 253, 232, 0.08);
            border-color: var(--primary);
        }

        /* Quiz Table Styling */
        .quiz-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            background: var(--bg-card);
            border-radius: 1rem;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .quiz-table::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--osian-gradient);
        }

        .quiz-table th {
            text-align: left;
            padding: 1.25rem;
            background: rgba(134, 253, 232, 0.08);
            color: var(--text-main);
            font-weight: 600;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
        }

        .quiz-table td {
            padding: 1.25rem;
            border-bottom: 1px solid rgba(134, 253, 232, 0.08);
            color: var(--text-para);
            font-size: 0.875rem;
            vertical-align: middle;
        }

        .quiz-table tr {
            transition: all 0.2s ease;
        }

        .quiz-table tr:hover {
            background: rgba(134, 253, 232, 0.05);
        }

        .quiz-table tr:last-child td {
            border-bottom: none;
        }

        /* Status Badges */
        .status-badge {
            display: inline-block;
            padding: 0.375rem 0.75rem;
            border-radius: 1rem;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-published {
            background: rgba(134, 253, 232, 0.15);
            color: var(--primary);
            border: 1px solid var(--primary);
        }

        .status-draft {
            background: rgba(159, 182, 204, 0.15);
            color: var(--text-muted);
            border: 1px solid var(--text-muted);
        }

        .status-scheduled {
            background: rgba(249, 245, 134, 0.15);
            color: var(--secondary);
            border: 1px solid var(--secondary);
        }

        .status-ended {
            background: rgba(167, 139, 250, 0.15);
            color: var(--color-purple-500);
            border: 1px solid var(--color-purple-500);
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .btn-action {
            background: rgba(134, 253, 232, 0.08);
            border: 1px solid var(--border);
            color: var(--text-muted);
            width: 36px;
            height: 36px;
            border-radius: 0.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .btn-action:hover {
            background: var(--primary);
            color: var(--bg-sidebar);
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .btn-action.delete:hover {
            background: var(--danger);
            border-color: var(--danger);
            color: white;
        }

        .btn-action.preview:hover {
            background: var(--color-purple-500);
            border-color: var(--color-purple-500);
            color: white;
        }

        /* Quiz Title Styling */
        .quiz-title {
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 0.25rem;
        }

        .quiz-subtitle {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .mobile-toggle {
                display: block;
            }

            .sidebar {
                transform: translateX(-100%);
            }
            
            .sidebar.open {
                transform: translateX(0);
            }

            .main-content {
                margin-left: 0;
                max-width: 100%;
                padding: 1.5rem;
            }

            .quiz-table {
                display: block;
                overflow-x: auto;
            }
            
            .action-buttons {
                flex-direction: column;
                gap: 0.25rem;
            }
            
            .btn-action {
                width: 100%;
                justify-content: center;
            }
        }

        @media (max-width: 1024px) {
            .quiz-table th:nth-child(5),
            .quiz-table td:nth-child(5) {
                display: none;
            }
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-card);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }
    </style>
</head>

    <!-- Main Content -->
    <main class="main-content">
        <div class="header">
            <div style="display: flex; align-items: center;">

        <div class="container">
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <h2 style="margin: 0;">All Global Quizzes</h2>
                    <a href="../super-admin/create-quiz.html?type=Global" class="btn btn-primary">
                        <i class='bx bx-plus'></i> Create Global Quiz
                    </a>
                </div>

                <div style="overflow-x: auto;">
                    <table class="quiz-table">
                        <thead>
                            <tr>
                                <th>Title</th>

                                <th>Questions</th>
                                <th>Duration</th>

                        </thead>
                        <tbody id="quiz-table-body"></tbody>
                    </table>
                </div>
            </div>

    <script>
        // Mobile Sidebar Toggle
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        // Global logout function
        // Quiz Actions
        function editQuiz(quizId) {
            console.log('Edit quiz:', quizId);
            // TODO: Implement edit functionality
        }

        function previewQuiz(quizId) {
            console.log('Preview quiz:', quizId);
            // TODO: Implement preview functionality
        }

        function deleteQuiz(quizId) {
            if (confirm('Are you sure you want to delete this quiz?')) {
                console.log('Delete quiz:', quizId);
                // TODO: Implement delete functionality
            }
        }

        // Load existing scripts
        document.addEventListener('DOMContentLoaded', function() {
            // Load auth guard if exists
            if (typeof loadAuthGuard === 'function') {
                loadAuthGuard();
            }
            
            // Load navbar if exists
            if (typeof loadNavbar === 'function') {
                loadNavbar();
            }
            
            // Load quizzes script if exists
            if (typeof loadGlobalQuizzes === 'function') {
                loadGlobalQuizzes();
            }
            
            // Attach event listeners to action buttons
            const editButtons = document.querySelectorAll('.btn-action:not(.preview):not(.delete)');
            const previewButtons = document.querySelectorAll('.btn-action.preview');
            const deleteButtons = document.querySelectorAll('.btn-action.delete');
            
            editButtons.forEach(btn => {
                btn.addEventListener('click', function() {
                    const quizId = this.closest('tr').querySelector('.quiz-subtitle').textContent.replace('ID: ', '');
                    editQuiz(quizId);
                });
            });
            
            previewButtons.forEach(btn => {
                btn.addEventListener('click', function() {
                    const quizId = this.closest('tr').querySelector('.quiz-subtitle').textContent.replace('ID: ', '');
                    previewQuiz(quizId);
                });
            });
            
            deleteButtons.forEach(btn => {
                btn.addEventListener('click', function() {
                    const quizId = this.closest('tr').querySelector('.quiz-subtitle').textContent.replace('ID: ', '');
                    deleteQuiz(quizId);
                });
            });
        });
    </script>
    
    <script src="../shared/auth-guard.js"></script>
