<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - OSIAN Super Admin</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Dark Theme Palette */
            --bg-main: #070B12;
            --bg-sidebar: #06121F;
            --bg-card: #0D1422;

            --text-main: #E6F1FF;
            --text-para: #BFD3E6;
            --text-muted: #8FA9C4;
            --text-sidebar: #BFD3E6;

            --primary: #86FDE8; /* OSIAN mint */
            --primary-hover: #5FFBF1; /* OSIAN cyan */
            --secondary: #F9F586; /* OSIAN yellow */
            
            --border: rgba(134,253,232,0.18);
            --border-color: rgba(134,253,232,0.18);
            
            --success: #86FDE8;
            --warning: #F9F586;
            --danger: #FF6B6B;

            --shadow: 0 14px 36px rgba(0,0,0,0.6);
            --osian-glow: rgba(134,253,232,0.35);
            --osian-gradient: linear-gradient(135deg, #5FFBF1, #86FDE8, #F9F586);

            /* Card Colors - Updated for dark theme */
            --color-blue-500: #5FFBF1; /* Cyan */
            --color-green-500: #86FDE8; /* Mint */
            --color-purple-500: #A78BFA; /* Light purple */
            --color-amber-500: #F9F586; /* Yellow */
            --color-cyan-500: #5FFBF1; /* Cyan */

            /* Additional colors */
            --white: #ffffff;
            --secondary-color: #0F1A2B;
            --text-light: #9FB6CC;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 16rem;
            background-color: var(--bg-sidebar);
            color: var(--text-sidebar);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            left: 0;
            top: 0;
            z-index: 1000;
            transition: transform 0.3s ease;
            border-right: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .brand {
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            border-bottom: 1px solid var(--border);
            background: var(--osian-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand i {
            font-size: 1.5rem;
            background: var(--osian-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand span {
            font-size: 1.25rem;
            font-weight: 700;
            background: var(--osian-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-menu {
            flex: 1;
            padding: 1.5rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            overflow-y: auto;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 0.5rem;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            font-weight: 500;
            border: 1px solid transparent;
        }

        .nav-item:hover {
            background-color: rgba(134, 253, 232, 0.08);
            border-color: var(--border);
            color: var(--text-main);
            transform: translateX(5px);
        }

        .nav-item.active {
            background: rgba(134, 253, 232, 0.12);
            border-color: var(--primary);
            color: var(--primary);
            box-shadow: 0 0 20px var(--osian-glow);
        }

        .nav-item i {
            font-size: 1.25rem;
        }

        .logout-container {
            padding: 1rem;
            border-top: 1px solid var(--border);
        }

        /* Main Content */
        .main-content {
            margin-left: 16rem;
            flex: 1;
            padding: 2rem;
            max-width: calc(100vw - 16rem);
            min-height: 100vh;
            background-color: var(--bg-main);
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 2.5rem;
            background: transparent;
            padding: 1rem 0;
        }

        .page-title h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 0.5rem;
            background: var(--osian-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-title p {
            color: var(--text-para);
            font-size: 1rem;
            line-height: 1.5;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .notification-icon {
            font-size: 1.5rem;
            color: var(--text-muted);
            cursor: pointer;
            position: relative;
            transition: color 0.3s;
        }

        .notification-icon:hover {
            color: var(--primary);
        }

        .notification-badge {
            position: absolute;
            top: -2px;
            right: -2px;
            width: 8px;
            height: 8px;
            background-color: var(--danger);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--danger);
        }

        .user-profile-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            cursor: pointer;
        }

        /* FIXED: Avatar size - made smaller and fixed */
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--osian-gradient);
            color: var(--bg-sidebar);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 1rem;
            border: 2px solid var(--primary);
            overflow: hidden;
            flex-shrink: 0;
        }

        /* FIXED: User avatar in table rows - smaller size */
        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--osian-gradient);
            color: var(--bg-sidebar);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
            font-size: 0.875rem;
            border: 1px solid var(--primary);
            margin-right: 0.75rem;
            flex-shrink: 0;
        }

        /* Mobile Menu Toggle */
        .mobile-toggle {
            display: none;
            font-size: 1.5rem;
            color: var(--primary);
            cursor: pointer;
            margin-right: 1rem;
            background: var(--osian-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Container Styling */
        .container {
            width: 100%;
            margin: 0 auto;
        }

        /* Card Styling */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.75rem;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--osian-gradient);
        }

        .card h3 {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 1.5rem;
            background: var(--osian-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Search Input */
        input[type="text"] {
            width: 300px;
            padding: 10px 10px 10px 35px;
            background: var(--bg-main);
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 8px;
            font-size: 0.875rem;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--osian-glow);
        }

        input[type="text"]::placeholder {
            color: var(--text-muted);
        }

        /* Table Styling */
        .user-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }

        .user-table thead {
            background: rgba(134, 253, 232, 0.08);
        }

        .user-table th {
            padding: 1rem;
            text-align: left;
            font-weight: 600;
            color: var(--text-main);
            border-bottom: 1px solid var(--border);
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .user-table tbody tr {
            transition: all 0.2s ease;
            border-bottom: 1px solid rgba(134, 253, 232, 0.08);
        }

        .user-table tbody tr:hover {
            background: rgba(134, 253, 232, 0.05);
        }

        .user-table td {
            padding: 1rem;
            color: var(--text-para);
            font-size: 0.875rem;
            vertical-align: middle;
        }

        /* FIXED: User name cell with avatar */
        .user-name-cell {
            display: flex;
            align-items: center;
        }

        .user-table tbody tr:last-child {
            border-bottom: none;
        }

        /* Role Badge */
        .role-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .role-user {
            background: rgba(134, 253, 232, 0.15);
            color: var(--primary);
            border: 1px solid var(--primary);
        }

        .role-admin {
            background: rgba(249, 245, 134, 0.15);
            color: var(--secondary);
            border: 1px solid var(--secondary);
        }

        .role-super-admin {
            background: rgba(95, 251, 241, 0.15);
            color: var(--color-blue-500);
            border: 1px solid var(--color-blue-500);
        }

        /* Status Badge */
        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .status-active {
            background: rgba(134, 253, 232, 0.15);
            color: var(--primary);
            border: 1px solid var(--primary);
        }

        .status-inactive {
            background: rgba(255, 107, 107, 0.15);
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        /* Button Styling */
        .btn {
            background: var(--osian-gradient);
            color: var(--bg-sidebar);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.75rem;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px var(--osian-glow);
        }

        .btn-small {
            padding: 0.25rem 0.75rem;
            font-size: 0.75rem;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-main);
        }

        .btn-outline:hover {
            background: rgba(134, 253, 232, 0.08);
            border-color: var(--primary);
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 0.5rem;
        }

        /* Pagination Controls */
        .pagination-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        .pagination-controls button {
            background: var(--bg-card);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            min-width: 100px;
        }

        .pagination-controls button:hover:not(:disabled) {
            border-color: var(--primary);
            background: rgba(134, 253, 232, 0.08);
            transform: translateY(-2px);
        }

        .pagination-controls button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pagination-controls button:active:not(:disabled) {
            transform: translateY(0);
        }

        #page-info {
            color: var(--text-muted);
            font-size: 0.875rem;
            font-weight: 500;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .mobile-toggle {
                display: block;
            }

            .sidebar {
                transform: translateX(-100%);
            }
            
            .sidebar.open {
                transform: translateX(0);
            }

            .main-content {
                margin-left: 0;
                max-width: 100%;
                padding: 1.5rem;
            }

            input[type="text"] {
                width: 100%;
            }
            
            .pagination-controls {
                flex-direction: column;
                gap: 1rem;
            }
            
            .pagination-controls button {
                width: 100%;
            }
            
            .action-buttons {
                flex-direction: column;
                gap: 0.25rem;
            }
            
            .action-buttons .btn {
                width: 100%;
                justify-content: center;
            }
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-card);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="brand">
            <i class='bx bxs-dashboard'></i>
            <span>OSIAN</span>
        </div>
        
        <nav class="nav-menu">
            <a href="dashboard.html" class="nav-item">
                <i class='bx bxs-grid-alt'></i>
                <span>Dashboard</span>
            </a>
            <a href="admin-management.html" class="nav-item">
                <i class='bx bxs-user-detail'></i>
                <span>Manage Admins</span>
            </a>
            <a href="user-management.html" class="nav-item active">
                <i class='bx bxs-group'></i>
                <span>Manage Users</span>
            </a>
            <a href="manage-departments.html" class="nav-item">
                <i class='bx bxs-building-house'></i>
                <span>Departments</span>
            </a>
            <a href="manage-categories.html" class="nav-item">
                <i class='bx bxs-folder'></i>
                <span>Categories</span>
            </a>
            <a href="manage-global-quizzes.html" class="nav-item">
                <i class='bx bxs-help-circle'></i>
                <span>Global Quizzes</span>
            </a>
            <a href="all-results.html" class="nav-item">
                <i class='bx bxs-bar-chart-alt-2'></i>
                <span>All Results</span>
            </a>
            <a href="events.html" class="nav-item">
                <i class='bx bxs-calendar-event'></i>
                <span>Events</span>
            </a>
            <a href="site-settings.html" class="nav-item">
                <i class='bx bxs-cog'></i>
                <span>Site Settings</span>
            </a>
        </nav>

        <div class="logout-container">
             <a href="/frontend/index.html" onclick="logout()" class="nav-item">
                <i class='bx bx-log-out'></i>
                <span>Logout</span>
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div class="header">
            <div style="display: flex; align-items: center;">
                <i class='bx bx-menu mobile-toggle' onclick="toggleSidebar()"></i>
                <div class="page-title">
                    <h1>User Management</h1>
                    <p>Manage all platform users and their roles</p>
                </div>
            </div>
            
            <div class="header-actions">
                <div class="notification-icon">
                    <i class='bx bx-bell'></i>
                    <span class="notification-badge"></span>
                </div>
                <div class="user-profile-header">
                    <!-- FIXED: Top-right avatar is now properly sized -->
                    <div class="avatar">SA</div>
                </div>
            </div>
        </div>

        <div class="container">
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h3>All Users</h3>
                    <div style="position: relative;">
                        <i class='bx bx-search' style="position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                        <input type="text" id="user-search" placeholder="Search by name or email...">
                    </div>
                </div>

                <div style="overflow-x: auto;">
                    <table class="user-table" id="all-users-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Status</th>
                                <th>Joined</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            
                        </tbody>
                    </table>
                </div>

                <div class="pagination-controls">
                    <button id="prev-page" disabled>&lt; Previous</button>
                    <span id="page-info">Page 1 of 1</span>
                    <button id="next-page" disabled>Next &gt;</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Mobile Sidebar Toggle
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        // Global logout function
        window.logout = function() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/frontend/auth/login.html';
        };

        // Load existing scripts
        document.addEventListener('DOMContentLoaded', function() {
            // Load auth guard if exists
            if (typeof loadAuthGuard === 'function') {
                loadAuthGuard();
            }
            
            // Load navbar if exists
            if (typeof loadNavbar === 'function') {
                loadNavbar();
            }
            
            // Load user management script if exists
            if (typeof loadUserManagement === 'function') {
                loadUserManagement();
            }
        });
    </script>
    
    <script src="/frontend/shared/auth-guard.js"></script>
    <script src="/frontend/shared/navbar.js"></script>
    <script src="script-user-management.js"></script>
</body>
</html>
