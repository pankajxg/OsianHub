<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registrations</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/frontend/shared/css/style-dashboard.css">
    <style>
        :root {
          --bg-main: #070B12;
          --bg-sidebar: #06121F;
          --bg-card: #0D1422;
          --text-main: #E6F1FF;
          --text-para: #BFD3E6;
          --text-muted: #8FA9C4;
          --text-sidebar: #BFD3E6;
          --primary: #86FDE8;
          --primary-hover: #5FFBF1;
          --secondary: #F9F586;
          --border: rgba(134,253,232,0.18);
          --border-color: rgba(134,253,232,0.18);
          --success: #86FDE8;
          --warning: #F9F586;
          --danger: #FF6B6B;
          --shadow: 0 14px 36px rgba(0,0,0,0.6);
          --osian-glow: rgba(134,253,232,0.35);
          --osian-gradient: linear-gradient(135deg, #5FFBF1, #86FDE8, #F9F586);
          --white: #ffffff;
          --secondary-color: #0F1A2B;
          --text-light: #9FB6CC;
        }

        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
          font-family: 'Inter', sans-serif;
        }

        body {
          background-color: var(--bg-main);
          color: var(--text-main);
          display: flex;
          min-height: 100vh;
          overflow-x: hidden;
        }

        .sidebar {
          width: 16rem;
          background-color: var(--bg-sidebar);
          color: var(--text-sidebar);
          display: flex;
          flex-direction: column;
          position: fixed;
          height: 100vh;
          left: 0;
          top: 0;
          z-index: 1000;
          transition: transform 0.3s ease;
          border-right: 1px solid var(--border);
          box-shadow: var(--shadow);
        }

        .brand {
          padding: 1.5rem;
          display: flex;
          align-items: center;
          gap: 0.75rem;
          border-bottom: 1px solid var(--border);
        }

        .brand i,
        .brand span {
          background: var(--osian-gradient);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          background-clip: text;
        }

        .brand span {
          font-size: 1.25rem;
          font-weight: 700;
        }

        .nav-menu {
          flex: 1;
          padding: 1.5rem 1rem;
          display: flex;
          flex-direction: column;
          gap: 0.5rem;
          overflow-y: auto;
        }

        .nav-item {
          display: flex;
          align-items: center;
          gap: 0.75rem;
          padding: 0.75rem 1rem;
          color: var(--text-muted);
          text-decoration: none;
          border-radius: 0.5rem;
          transition: all 0.3s ease;
          font-size: 0.95rem;
          font-weight: 500;
          border: 1px solid transparent;
        }

        .nav-item:hover {
          background-color: rgba(134, 253, 232, 0.08);
          border-color: var(--border);
          color: var(--text-main);
          transform: translateX(5px);
        }

        .nav-item.active {
          background: rgba(134, 253, 232, 0.12);
          border-color: var(--primary);
          color: var(--primary);
          box-shadow: 0 0 20px var(--osian-glow);
        }

        .nav-item i {
          font-size: 1.25rem;
        }

        .logout-container {
          padding: 1rem;
          border-top: 1px solid var(--border);
        }

        .main-content {
          margin-left: 16rem;
          flex: 1;
          padding: 2rem;
          max-width: calc(100vw - 16rem);
          min-height: 100vh;
          background-color: var(--bg-main);
        }

        .header {
          display: flex;
          justify-content: space-between;
          align-items: flex-start;
          margin-bottom: 2.5rem;
          padding: 1rem 0;
        }

        .page-title h1 {
          font-size: 1.75rem;
          font-weight: 700;
          margin-bottom: 0.5rem;
          background: var(--osian-gradient);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          background-clip: text;
        }

        .page-title p {
          color: var(--text-para);
          font-size: 1rem;
          line-height: 1.5;
        }

        .header-actions {
          display: flex;
          align-items: center;
          gap: 1.5rem;
        }

        .notification-icon {
          font-size: 1.5rem;
          color: var(--text-muted);
          cursor: pointer;
          position: relative;
          transition: color 0.3s;
        }

        .notification-icon:hover {
          color: var(--primary);
        }

        .notification-badge {
          position: absolute;
          top: -2px;
          right: -2px;
          width: 8px;
          height: 8px;
          background-color: var(--danger);
          border-radius: 50%;
          box-shadow: 0 0 10px var(--danger);
        }

        .user-profile-header {
          display: flex;
          align-items: center;
          gap: 0.75rem;
        }

        .avatar {
          width: 40px;
          height: 40px;
          border-radius: 50%;
          background: var(--osian-gradient);
          color: var(--bg-sidebar);
          display: flex;
          align-items: center;
          justify-content: center;
          font-weight: 600;
          font-size: 1rem;
          border: 2px solid var(--primary);
          overflow: hidden;
          flex-shrink: 0;
        }

        .mobile-toggle {
          display: none;
          font-size: 1.5rem;
          color: var(--primary);
          cursor: pointer;
          margin-right: 1rem;
          background: var(--osian-gradient);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          background-clip: text;
        }

        .container {
          width: 100%;
          margin: 0 auto;
        }

        .card {
          background: var(--bg-card);
          border: 1px solid var(--border);
          border-radius: 1rem;
          padding: 1.75rem;
          box-shadow: var(--shadow);
          position: relative;
          overflow: hidden;
        }

        .card::before {
          content: '';
          position: absolute;
          top: 0;
          left: 0;
          right: 0;
          height: 3px;
          background: var(--osian-gradient);
        }

        .btn {
          background: var(--osian-gradient);
          color: var(--bg-sidebar);
          padding: 0.75rem 1.5rem;
          border-radius: 0.5rem;
          text-decoration: none;
          font-weight: 600;
          font-size: 0.875rem;
          transition: all 0.3s ease;
          border: none;
          cursor: pointer;
          display: inline-flex;
          align-items: center;
          gap: 0.5rem;
          position: relative;
          overflow: hidden;
          z-index: 1;
        }

        .btn-secondary {
          background: transparent;
          border: 1px solid var(--border);
          color: var(--text-main);
        }

        .btn-secondary:hover {
          background: rgba(134, 253, 232, 0.08);
          border-color: var(--primary);
        }

        table {
          width: 100%;
          border-collapse: separate;
          border-spacing: 0;
        }

        th {
          text-align: left;
          padding: 1rem;
          background: rgba(134, 253, 232, 0.08);
          color: var(--text-main);
          font-weight: 600;
          font-size: 0.875rem;
          text-transform: uppercase;
          letter-spacing: 0.5px;
          border-bottom: 1px solid var(--border);
        }

        td {
          padding: 1rem;
          border-bottom: 1px solid rgba(134, 253, 232, 0.08);
          color: var(--text-para);
          font-size: 0.875rem;
          vertical-align: top;
        }

        tbody tr:hover {
          background: rgba(134, 253, 232, 0.05);
        }

        #reg-table td:last-child {
          max-width: 640px;
        }

        .skeleton-card {
          border-radius: 12px;
          background: linear-gradient(90deg, #0B1221 25%, #131c2e 50%, #0B1221 75%);
          background-size: 200% 100%;
          animation: sk-pulse 1.5s infinite;
        }

        @keyframes sk-pulse {
          0% { background-position: 200% 0; }
          100% { background-position: -200% 0; }
        }

        .empty-state {
          padding: 2rem 1rem;
          text-align: center;
          color: var(--text-muted);
        }

        .empty-state i {
          font-size: 2rem;
          margin-bottom: 0.5rem;
        }

        @media (max-width: 768px) {
          .mobile-toggle {
            display: block;
          }

          .sidebar {
            transform: translateX(-100%);
          }

          .sidebar.open {
            transform: translateX(0);
          }

          .main-content {
            margin-left: 0;
            max-width: 100%;
            padding: 1.5rem;
          }

          table {
            display: block;
            overflow-x: auto;
          }
        }
    </style>
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <i class='bx bxs-dashboard'></i>
      <span>OSIAN</span>
    </div>
    
    <nav class="nav-menu">
      <a href="dashboard.html" class="nav-item">
        <i class='bx bxs-grid-alt'></i>
        <span>Dashboard</span>
      </a>
      <a href="admin-management.html" class="nav-item">
        <i class='bx bxs-user-detail'></i>
        <span>Manage Admins</span>
      </a>
      <a href="user-management.html" class="nav-item">
        <i class='bx bxs-group'></i>
        <span>Manage Users</span>
      </a>
      <a href="manage-departments.html" class="nav-item">
        <i class='bx bxs-building-house'></i>
        <span>Departments</span>
      </a>
      <a href="manage-categories.html" class="nav-item">
        <i class='bx bxs-folder'></i>
        <span>Categories</span>
      </a>
      <a href="manage-global-quizzes.html" class="nav-item">
        <i class='bx bxs-help-circle'></i>
        <span>Global Quizzes</span>
      </a>
      <a href="all-results.html" class="nav-item">
        <i class='bx bxs-bar-chart-alt-2'></i>
        <span>All Results</span>
      </a>
      <a href="events.html" class="nav-item active">
        <i class='bx bxs-calendar-event'></i>
        <span>Events</span>
      </a>
      <a href="site-settings.html" class="nav-item">
        <i class='bx bxs-cog'></i>
        <span>Site Settings</span>
      </a>
      <a href="profile.html" class="nav-item">
        <i class='bx bxs-user-circle'></i>
        <span>My Profile</span>
      </a>
    </nav>

    <div class="logout-container">
      <a href="/frontend/index.html" onclick="logout()" class="nav-item">
        <i class='bx bx-log-out'></i>
        <span>Logout</span>
      </a>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <div class="header">
      <div style="display: flex; align-items: center;">
        <i class='bx bx-menu mobile-toggle' onclick="toggleSidebar()"></i>
        <div class="page-title">
          <h1>Event Registrations</h1>
          <p id="page-subtitle"></p>
        </div>
      </div>
      <div class="header-actions">
        <div class="notification-icon">
          <i class='bx bx-bell'></i>
          <span class="notification-badge"></span>
        </div>
        <div class="user-profile-header">
          <div class="avatar">SA</div>
        </div>
      </div>
    </div>

    <div class="container">
      <div class="card">
        <div class="toolbar" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;">
          <h2 id="event-title">Loading...</h2>
          <a id="back-link" href="events.html" class="btn btn-secondary">
            <i class='bx bx-arrow-back'></i> Back
          </a>
        </div>

        <div id="loading-state" class="skeleton-card" style="height: 120px;"></div>
        <div id="error-state" class="empty-state" style="display:none;">
          <i class='bx bx-error-circle'></i>
          <p id="error-text">Failed to load registrations</p>
        </div>

        <div style="overflow-x:auto; margin-top: 1rem;">
          <table id="reg-table" style="display:none;">
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Registered At</th>
                <th>Details</th>
              </tr>
            </thead>
            <tbody id="reg-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script>
    function toggleSidebar() {
      var sb = document.getElementById('sidebar');
      if (sb) sb.classList.toggle('open');
    }

    window.logout = function() {
      try {
        localStorage.removeItem('token');
        localStorage.removeItem('user');
      } catch (_) {}
      window.location.href = '/frontend/auth/login.html';
    };
  </script>

  <script src="/frontend/shared/auth-guard.js"></script>
  <script src="/frontend/shared/js/shared-init.js"></script>
  <script src="/frontend/shared/navbar.js"></script>
  <script src="/frontend/super-admin/script-event-registrations.js"></script>
</body>
</html>
